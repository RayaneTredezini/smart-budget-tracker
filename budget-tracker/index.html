<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Budget Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>💰 Smart Budget Tracker</h1>

    <div class="form">
      <input type="text" id="name" placeholder="Expense name">
      <input type="number" id="amount" placeholder="Amount (£)">
      
      <select id="category">
        <option>Food</option>
        <option>Transport</option>
        <option>Bills</option>
        <option>Shopping</option>
      </select>

      <button onclick="addExpense()">Add Expense</button>
    </div>

    <h2>Expenses</h2>
    <ul id="list"></ul>

    <h2 id="total">Total: £0</h2>
    <h3 id="insight"></h3>
  </div>

  <script src="script.js"></script>
</body>
</html>
